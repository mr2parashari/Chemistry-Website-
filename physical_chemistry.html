<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physical Chemistry</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="main-header">
  <h1>Chemistry Learning</h1>

  <div class="tabs">
    <button class="tab-btn" onclick="location.href='index.html'">Organic Chemistry</button>
    <button class="tab-btn" onclick="location.href='inorganic_chemistry.html'">Inorganic Chemistry</button>
    <button class="tab-btn activeTab">Physical Chemistry</button>
  </div> </header>
  <br>
  <div class="profile-bar">
    <img src="profile.jpg" class="profile-pic">
    <div class="profile-meta">
      <div class="name-line">Shruti Yadav</div>
      <div class="stats-line">
        Score: <span id="scoreTop">0</span> &nbsp;&nbsp;
        Attempts: <span id="attemptsTop">0</span>
      </div>
    </div>
  </div> <br>


<!-- GRID PANEL (Topics) -->
<section id="gridPanel">
  <div class="topicGrid">

    <div class="topic" onclick="openTopic(0)">
      <img src="icons/temp.jpg">
      <div>Thermodynamics</div>
    </div>

    <div class="topic" onclick="openTopic(1)">
      <img src="icons/equilibrium.jpg">
      <div>Equilibrium</div>
    </div>

    <div class="topic" onclick="openTopic(2)">
      <img src="icons/rate.jpg">
      <div>Reaction Rate</div>
    </div>

    <div class="topic" onclick="openTopic(3)">
      <img src="icons/state.jpg">
      <div>States of Matter</div>
    </div>

    <div class="topic" onclick="openTopic(4)">
      <img src="icons/solution.jpg">
      <div>Solutions</div>
    </div>

  </div>
</section>

<!-- QUIZ PANEL -->
<section id="quizPanel" style="display:none;">
  <div class="card">

    <h2 id="topicTitle"></h2>

    <iframe id="videoFrame" allowfullscreen></iframe>

    <div id="quizBox"></div>

    <div class="action-row">
      <button class="submit-btn" onclick="submitQuiz()">Submit</button>
      <button class="back-page-btn" onclick="backToGrid()">Back</button>
    </div>

    <div id="warning" class="warning"></div>

  </div>
</section>

<script src="physical.js"></script>

</body>
</html>
